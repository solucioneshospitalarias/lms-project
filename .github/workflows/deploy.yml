name: Deploy Automático LMS (Full Stack)

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener código
        uses: actions/checkout@v3

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 3. Build del Frontend (React + Vite)
        run: |
          cd frontend
          npm install
          npm run build

      - name: 4. Subir Frontend a public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/ 
          server-dir: ./public_html/  # Forzamos la ruta del front
          protocol: ftp

      - name: 5. Subir Backend (Django) a lms-project
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/       # Sube tu carpeta de Django
          server-dir: ./lms-project/  # Destino en la raíz de cPanel
          protocol: ftp
          exclude: |                  # Evitamos subir archivos innecesarios
            **/venv/**
            **/.env
            **/__pycache__/**