name: Deploy Automático LMS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener código
        uses: actions/checkout@v3

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 3. Build del Frontend (React + Vite)
        run: |
          cd frontend
          npm install
          npm run build

      # ─── DEPLOY FRONTEND → /home/rutasdel/public_html ────────────
      - name: 4. Subir Frontend a public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}   # → rutasdel
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/               # desde /home/rutasdel/
          protocol: ftp
          port: 21
          timeout: 90000
          passive: true
          dangerous-clean-slate: false

      # ─── DEPLOY BACKEND → /home/rutasdel/lms-project ─────────────
      - name: 5. Subir Backend Python a lms-project
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}   # → rutasdel
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /lms-project/               # desde /home/rutasdel/
          protocol: ftp
          port: 21
          timeout: 90000
          passive: true
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/__pycache__/**
            **/*.pyc
            **/venv/**
            **/.env