name: Deploy Automático LMS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener código
        uses: actions/checkout@v3

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 3. Build del Frontend (React + Vite)
        run: |
          cd frontend
          npm install
          npm run build

      # ─── DEPLOY FRONTEND → public_html ───────────────────────────
      - name: 4. Subir Frontend a public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/       # lo que genera Vite
          server-dir: /public_html/          # carpeta ya existente en cPanel
          protocol: ftp
          port: 21
          timeout: 90000
          passive: true
          dangerous-clean-slate: false       # NO borra lo que ya hay

      # ─── DEPLOY BACKEND → lms-project ────────────────────────────
      - name: 5. Subir Backend Python a lms-project
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/              # carpeta de tu backend en el repo
          server-dir: /lms-project/          # carpeta ya existente en cPanel
          protocol: ftp
          port: 21
          timeout: 90000
          passive: true
          dangerous-clean-slate: false       # NO borra lo que ya hay
          exclude: |
            **/.git*
            **/__pycache__/**
            **/*.pyc
            **/venv/**
            **/.env