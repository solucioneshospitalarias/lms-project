name: Deploy Automático LMS (Full Stack - Fix Rutas)

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Obtener código
        uses: actions/checkout@v3

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 3. Build del Frontend (React + Vite)
        run: |
          cd frontend
          npm install
          npm run build

      - name: 4. Actualizar Frontend en public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          # IMPORTANTE: Sin el punto inicial para que entre a la carpeta existente
          server-dir: public_html/ 
          state-name: .ftp-deploy-sync-state-frontend.json

      - name: 5. Agregar archivos Backend a lms-project
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          # IMPORTANTE: Entra directo a la carpeta lms-project que está afuera
          server-dir: lms-project/ 
          state-name: .ftp-deploy-sync-state-backend.json
          exclude: |
            **/venv/**
            **/.env
            **/__pycache__/**